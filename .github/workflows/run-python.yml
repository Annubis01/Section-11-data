name: Run Python Command

on:
  push:  # Trigger on every push
    branches:
      - main

jobs:
  run-python:
    runs-on: ubuntu-latest  # GitHub-hosted Linux runner

    steps:
      # Step 1: Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Choose your Python version

      # Step 3: Run a Python one-liner
      - name: Execute Python command
        run: python -c "print('Hello from GitHub Actions!')"

      # Step 4 (Optional): Run a Python script from repo
      - name: Run script.py
        run: python script.py
