name: Push Workout to Intervals.icu
on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Workout Title'
        required: true
      workout:
        description: 'Workout Description (Steps)'
        required: true
      date:
        description: 'Date (YYYY-MM-DD)'
        required: true
      confirm:
        description: 'Execute write (false = preview only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
          
jobs:
  push-workout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run push.py
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
        run: |
          python3 push.py push --name "${{ github.event.inputs.title }}" --description "${{ github.event.inputs.workout }}" --date "${{ github.event.inputs.date }}"
